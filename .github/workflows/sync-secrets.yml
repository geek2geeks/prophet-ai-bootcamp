name: Sync Secrets to Streamlit Cloud

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'deploy.sh'
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Streamlit CLI
        run: |
          pip install streamlit
      
      - name: Create .streamlit directory and secrets
        run: |
          mkdir -p ~/.streamlit
          cat > ~/.streamlit/secrets.toml << 'EOF'
          [supabase]
          url = "https://naecdtkxxlawxlkljtkt.supabase.co"
          key = "${{ secrets.SUPABASE_ANON_KEY }}"
          service_key = "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          
          [deepseek]
          api_key = "${{ secrets.DEEPSEEK_API_KEY }}"
          
          [app]
          url = "https://ai-actuary.streamlit.app"
          EOF
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      
      - name: Echo secret keys set (for verification)
        run: |
          echo "✅ Secrets loaded from GitHub"
          echo "   SUPABASE_ANON_KEY: ${#SUPABASE_ANON_KEY} chars"
          echo "   SUPABASE_SERVICE_ROLE_KEY: ${#SUPABASE_SERVICE_ROLE_KEY} chars"
          echo "   DEEPSEEK_API_KEY: ${#DEEPSEEK_API_KEY} chars"
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      
      - name: Verify secrets.toml
        run: |
          if grep -q "SUPABASE_ANON_KEY" ~/.streamlit/secrets.toml || grep -q "\${{" ~/.streamlit/secrets.toml; then
            echo "⚠️ Secrets contain variables - checking actual values..."
            if [ ! -z "$SUPABASE_ANON_KEY" ]; then
              echo "✅ SUPABASE_ANON_KEY is set"
            fi
          else
            echo "✅ All secrets properly interpolated"
            cat ~/.streamlit/secrets.toml | head -3
          fi
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      
      - name: Deployment checklist
        run: |
          echo "🎯 Deployment Checklist:"
          echo "✅ App URL: https://ai-actuary.streamlit.app"
          echo "✅ Google OAuth: Enabled in Supabase config"
          echo "✅ Secrets: Configured from GitHub Secrets"
          echo ""
          echo "📋 Manual Step Required:"
          echo "   1. Go to https://share.streamlit.io/apps"
          echo "   2. Click 'ai-actuary' → Settings → Secrets"
          echo "   3. Copy the Streamlit Cloud token from account settings"
          echo "   4. Add STREAMLIT_CLOUD_TOKEN to GitHub Secrets"
          echo "   5. This workflow will then auto-sync all secrets"
