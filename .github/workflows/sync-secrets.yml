name: Sync Secrets to Streamlit Cloud

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'deploy.sh'
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Streamlit CLI
        run: pip install streamlit

      - name: Create .streamlit directory and secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p ~/.streamlit
          cat > ~/.streamlit/secrets.toml << 'EOF'
          [supabase]
          url = "https://naecdtkxxlawxlkljtkt.supabase.co"
          key = "${{ secrets.SUPABASE_ANON_KEY }}"
          service_key = "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

          [deepseek]
          api_key = "${{ secrets.DEEPSEEK_API_KEY }}"

          [app]
          url = "https://ai-actuary.streamlit.app"
          EOF

      - name: Verify secrets are set
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "Secrets loaded from GitHub"
          echo "  SUPABASE_ANON_KEY: ${#SUPABASE_ANON_KEY} chars"
          echo "  SUPABASE_SERVICE_ROLE_KEY: ${#SUPABASE_SERVICE_ROLE_KEY} chars"
          echo "  DEEPSEEK_API_KEY: ${#DEEPSEEK_API_KEY} chars"

      - name: Deployment checklist
        run: |
          echo "App URL: https://ai-actuary.streamlit.app"
          echo "Google OAuth: Enabled in Supabase config"
          echo "Secrets: Configured from GitHub Secrets"
          echo ""
          echo "Manual step: verify secrets in Streamlit Cloud dashboard"
          echo "  https://share.streamlit.io/apps"
