<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box-user { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .box-ai { fill: #fdf4ff; stroke: #d946ef; stroke-width: 2; rx: 8; }
      .box-action { fill: #f0fdf4; stroke: #10b981; stroke-width: 2; rx: 8; }
      .text-title { font-family: system-ui, sans-serif; font-size: 16px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
      .text-desc { font-family: system-ui, sans-serif; font-size: 13px; fill: #475569; text-anchor: middle; }
      .text-actor { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; fill: #64748b; text-anchor: middle; letter-spacing: 0.05em; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .arrow-head { fill: #94a3b8; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- 1. Specify (Atuário) -->
  <g transform="translate(100, 40)">
    <rect width="600" height="70" class="box-user" />
    <text x="300" y="25" class="text-actor">Passo 1: O Atuário escreve</text>
    <text x="300" y="45" class="text-title">/speckit.specify</text>
    <text x="300" y="62" class="text-desc">"Quero uma página web que leia o carteira_vida.csv e mostre o prémio médio"</text>
  </g>

  <!-- Arrow Down -->
  <path d="M 400 110 L 400 135" class="arrow" />
  <polygon points="395,130 405,130 400,140" class="arrow-head" />

  <!-- 2. Clarify (AI Pergunta) -->
  <g transform="translate(100, 140)">
    <rect width="600" height="70" class="box-ai" />
    <text x="300" y="25" class="text-actor">Passo 2: O Agente de AI levanta Dúvidas (Evita Adivinhações)</text>
    <text x="300" y="45" class="text-title">/speckit.clarify</text>
    <text x="300" y="62" class="text-desc">"Se o CSV tiver apólices canceladas, devo incluí-las na média ou ignorar?"</text>
  </g>

  <!-- Arrow Down -->
  <path d="M 400 210 L 400 235" class="arrow" />
  <polygon points="395,230 405,230 400,240" class="arrow-head" />

  <!-- 3. Plan (AI Planeia) -->
  <g transform="translate(100, 240)">
    <rect width="600" height="70" class="box-ai" />
    <text x="300" y="25" class="text-actor">Passo 3: A Estrutura Técnica é Definida (Sem Escrever Código Ainda)</text>
    <text x="300" y="45" class="text-title">/speckit.plan</text>
    <text x="300" y="62" class="text-desc">Gera um plano com: [1] Ler CSV, [2] Filtrar Ativos, [3] Calcular Média, [4] Renderizar UI.</text>
  </g>

  <!-- Arrow Down -->
  <path d="M 400 310 L 400 335" class="arrow" />
  <polygon points="395,330 405,330 400,340" class="arrow-head" />

  <!-- 4. Implement (AI Coda) -->
  <g transform="translate(100, 340)">
    <rect width="600" height="70" class="box-action" />
    <text x="300" y="25" class="text-actor">Passo 4: O Código é Gerado (Automático)</text>
    <text x="300" y="45" class="text-title">/speckit.implement</text>
    <text x="300" y="62" class="text-desc">O LLM escreve os ficheiros React/Python baseados no Plano exato que aprovaste.</text>
  </g>

  <!-- Footer -->
  <text x="400" y="435" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#334155" text-anchor="middle">
    A mágica está no "Clarify": Obriga o LLM a mapear as incertezas antes de gerar código.
  </text>
</svg>